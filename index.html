<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <!-- app-like viewport: no input-focus zoom (maximum-scale=1 on touch),
         keyboard OVERLAYS the layout instead of squeezing it (Chrome/Android) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content" />
    <!-- theme-color is kept in sync with the live page background at runtime
         (src/lib/themeColor.js) so the mobile browser chrome never shows a white band -->
    <meta name="theme-color" content="#7c2d2d" />
    <!-- installed-PWA: let app content fill under the status bar (no white inset) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="rbt360" />
    <meta name="description" content="rbt360 — نظام تشغيل متكامل للمقاهي والمطاعم: منيو رقمي وطلب بالباركود، كاشير ومطبخ لحظي، مخزون، عروض وولاء، وفوترة متوافقة مع زاتكا — وبدون أي عمولة على طلباتك." />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="rbt360" />
    <meta property="og:title" content="rbt360 — نظام تشغيل مقهاك ومطعمك" />
    <meta property="og:description" content="شغّل مقهاك كله من نظام واحد عربي: منيو وطلب بالباركود، كاشير ومطبخ لحظي، مخزون ومساعد ذكي، وفوترة متوافقة مع زاتكا — بدون أي عمولة. ابدأ مجاناً." />
    <!-- absolute URL (crawlers ignore relative); TODO: replace with a 1200x630 PNG card — most scrapers skip SVG -->
    <meta property="og:image" content="https://rbt360sa.com/favicon.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="rbt360 — نظام تشغيل مقهاك ومطعمك" />
    <meta name="twitter:description" content="نظام تشغيل متكامل للمقاهي والمطاعم — بدون أي عمولة. ابدأ مجاناً." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Fonts: Tajawal (app) + IBM Plex Sans Arabic (marketing/auth) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent theme flash before React mounts -->
    <script>
      (function () {
        try {
          // diner surfaces (menu/orders/events/screens) keep an independent mode key
          var diner = ['/m/', '/order/', '/e/', '/book/', '/t/', '/screen', '/preview/menu'].some(function (p) { return location.pathname.indexOf(p) === 0; });
          var t = localStorage.getItem(diner ? 'ml.theme.menu' : 'ml.theme');
          if (!t) t = diner ? 'light' : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', t);
          var lang = localStorage.getItem('ml.lang') || 'ar';
          document.documentElement.setAttribute('lang', lang);
          document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
        } catch (e) {}
      })();
    </script>

    <title>rbt360</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
